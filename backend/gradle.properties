# Gradle JVM args - explicitly request Java 17 for the build
# Gradle 8.13 works with JDK 8-24. Since Java 25 is installed, we use toolchains.
# This file tells Gradle to use JDK 17 from the auto-provisioned toolchain.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.toolchains.foojay-resolver-convention.version=0.8.0

# Use the Gradle daemon for faster builds
org.gradle.daemon=true

# Enable parallel builds
org.gradle.parallel=true
